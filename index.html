<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Maths explicites CP-CE1-CE2 — V1.2</title>
<style>
:root{--m:#2563eb;--c:#16a34a;--d:#facc15;--u:#ef4444;--ink:#172033;--muted:#64748b;--bg:#f6f7fb;--card:#fff;--ok:#dcfce7;--auto:#dbeafe;--border:#d8deea;--soft:#fff7ed}*{box-sizing:border-box}body{margin:0;font-family:Arial,system-ui,sans-serif;background:var(--bg);color:var(--ink)}header{background:#fff;border-bottom:1px solid var(--border);padding:10px 14px;display:flex;gap:10px;align-items:center;justify-content:space-between}.brand{font-weight:800}.badge{display:inline-block;border-radius:999px;padding:4px 9px;background:#edf2ff;font-weight:700;font-size:13px}.btn{border:0;border-radius:12px;padding:10px 14px;background:#1f2937;color:white;font-weight:700;cursor:pointer}.btn.secondary{background:#e5e7eb;color:#111827}.btn.blue{background:#2563eb}.layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 58px)}aside{background:#fff;border-right:1px solid var(--border);padding:14px;overflow:auto}.main{padding:18px;overflow:auto}.phase{display:block;width:100%;text-align:left;margin:7px 0;padding:10px;border:1px solid var(--border);background:#fff;border-radius:12px;cursor:pointer}.phase.active{border-color:#2563eb;background:#eff6ff;font-weight:800}.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(15,23,42,.04)}.card h2{margin-top:0}.objective{font-size:30px;font-weight:900;line-height:1.2}.small{color:var(--muted);font-size:14px}.studentText{font-size:22px;line-height:1.35}.groupPanel{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}.group{border:1px solid var(--border);border-radius:14px;padding:12px;background:white}.group .level{font-weight:900;font-size:20px}.with{background:var(--ok)}.alone{background:var(--auto)}.work{margin-top:6px;font-size:17px}.work b{display:block;margin-bottom:3px}.studentDetails{display:grid;grid-template-columns:1fr 1fr;gap:14px}.bigBox{border:2px solid #111827;border-radius:16px;padding:14px;background:#fff}.bigBox h3{margin:0 0 8px;font-size:22px}.steps{font-size:20px;line-height:1.5}.steps li{margin:8px 0}.mat{display:flex;flex-wrap:wrap;gap:8px}.mat span{background:#f1f5f9;border:1px solid #cbd5e1;border-radius:999px;padding:7px 11px;font-weight:700}.place-table{border-collapse:collapse;width:100%;font-size:28px;text-align:center}.place-table th,.place-table td{border:2px solid #111827;padding:10px}.m{background:#dbeafe}.c{background:#dcfce7}.d{background:#fef3c7}.u{background:#fee2e2}.sticks{min-height:160px;background:#fff;border:2px dashed #cbd5e1;border-radius:16px;padding:16px;display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}.stick{width:9px;height:70px;background:#c08457;border-radius:6px;border:1px solid #7c4a27}.bundle{display:inline-flex;gap:3px;border:4px solid var(--d);border-radius:12px;padding:6px;background:#fffbeb;margin:5px}.hundred{border-color:var(--c);background:#f0fdf4}.sideHelp{position:fixed;right:0;top:95px;z-index:20;display:flex;flex-direction:column;gap:10px}.helpItem{position:relative;display:flex;justify-content:flex-end}.helpTab{background:#111827;color:#fff;padding:12px 10px;border-radius:12px 0 0 12px;font-weight:900;writing-mode:vertical-rl;letter-spacing:.5px;box-shadow:0 2px 10px rgba(0,0,0,.2)}.helpContent{display:none;position:absolute;right:42px;top:0;width:360px;max-width:calc(100vw - 80px);background:#fff;border:2px solid #111827;border-radius:16px;padding:14px;box-shadow:0 12px 35px rgba(0,0,0,.18);font-size:16px;line-height:1.35}.helpItem:hover .helpContent{display:block}.helpContent h3{margin:0 0 8px}.trace{width:148mm;min-height:105mm;background:#fff;color:#111;margin:auto;border:1px solid #ccc;padding:8mm;font-size:14px}.trace h1{font-size:19px;margin:0 0 5px}.trace .box{border:1px solid #333;border-radius:8px;padding:6px;margin:5px 0}.trace table{width:100%;border-collapse:collapse;text-align:center}.trace th,.trace td{border:1px solid #333;padding:4px}.printCard{display:none}@media print{body{background:white}header,aside,.noPrint,.sideHelp,#screen{display:none!important}.layout{display:block}.main{padding:0}.printCard{display:block!important;border:0;box-shadow:none;margin:0;padding:0}.trace{border:0;width:148mm;min-height:105mm}@page{size:A5 landscape;margin:7mm}}
</style>
</head>
<body>
<header><div class="brand">📚 Maths explicites CP-CE1-CE2 <span class="badge">V1.2 élève enrichi + aides au survol</span></div><div><button class="btn blue" onclick="printTrace()">Imprimer la trace A5</button></div></header>
<div class="layout">
<aside class="noPrint"><h3>Séance 1 — Numération</h3><p class="small">Vue principale = vue élèves enrichie. Les aides enseignant sont sur les boutons à droite.</p><div id="phaseList"></div><hr><p class="small"><b>Matériel fil rouge :</b><br>🪵 bûchettes + élastiques.</p></aside>
<main class="main">
<section class="card" id="screen"></section>
<section class="card printCard" id="traceCard"><div class="trace" id="trace"></div></section>
</main>
</div>
<div class="sideHelp noPrint" id="sideHelp"></div>
<script>
let current=0;
const phases=[
{title:'Préparation',time:0,groups:{CP:{state:'Préparation',work:'Cartes 1 à 30 prêtes'},CE1:{state:'Préparation',work:'Bûchettes + élastiques'},CE2:{state:'Préparation',work:'Bûchettes + élastiques'}},objective:'Préparer la séance de numération.',student:'Le matériel est prêt avant de commencer.',steps:['Sortir les bûchettes et les élastiques.','Préparer les ardoises.','Préparer les cartes-nombres CP.'],exercise:'Pas d’exercice élève à cette étape.',teacher:'Sortir environ 160 bûchettes, 30 élastiques, ardoises, tableaux de numération, cartes-nombres CP, manuels/fichiers.',question:'Pourquoi les bûchettes ?',answer:'Elles obligent les élèves à construire eux-mêmes les paquets de 10, 100 et 1000.',warn:'Ne pas distribuer trop tôt tout le matériel : risque de manipulation parasite.',why:'Les bûchettes permettent de comprendre la dizaine comme un regroupement construit, pas comme un symbole abstrait.'},
{title:'🎯 Objectif',time:3,groups:{CP:{state:'Avec le maître',work:'Écouter et reformuler : je compte jusqu’à 30'},CE1:{state:'Avec le maître',work:'Écouter et reformuler : je lis en dizaines/unités'},CE2:{state:'Avec le maître',work:'Écouter et reformuler : je lis jusqu’à 5 999'}},objective:'Aujourd’hui, nous apprenons à compter et à lire les nombres avec des paquets.',student:'À la fin, chaque élève doit pouvoir expliquer ce qu’il apprend.',steps:['CP : je dis la suite des nombres jusqu’à 30.','CE1 : je lis un nombre avec des dizaines et des unités.','CE2 : je lis un nombre jusqu’à 5 999 avec milliers, centaines, dizaines, unités.'],exercise:'Oral : chacun répète son objectif avec ses mots.',teacher:'Dire clairement les objectifs. Faire répéter : « Je vais apprendre à compter plus vite grâce aux paquets. »',question:'À quoi servent les paquets de 10 ?',answer:'À compter plus vite et à éviter de recompter un par un.',warn:'Si l’objectif n’est pas formulé, les élèves croient qu’ils “jouent avec des bâtons”.',why:'L’annonce de l’objectif oriente l’attention : les élèves savent ce qu’ils doivent apprendre, pas seulement ce qu’ils doivent faire.'},
{title:'🧠 Réactivation',time:5,groups:{CP:{state:'Avec le maître',work:'Compter 10 bûchettes avec le groupe'},CE1:{state:'Avec le maître',work:'Dire : 10 unités = 1 dizaine'},CE2:{state:'Avec le maître',work:'Rappeler le lien unités/dizaines/centaines'}},objective:'Je me rappelle : 10 unités forment 1 dizaine.',student:'On compte 10 bûchettes, puis on les attache : cela devient 1 dizaine.',steps:['Compter les 10 bûchettes une par une.','Les attacher avec un élastique.','Dire ensemble : 10 unités = 1 dizaine.'],exercise:'Ardoise CE : dessiner 1 dizaine et 3 unités.',teacher:'Montrer 10 bûchettes isolées. Les compter une à une puis les attacher avec un élastique.',question:'Quand j’attache 10 bûchettes, comment s’appelle le paquet ?',answer:'Une dizaine.',warn:'Erreur : “un paquet” sans préciser sa valeur. Faire dire : “un paquet de 10, donc une dizaine”.',why:'On réactive le prérequis indispensable avant de demander de lire 124 ou 1 247.'},
{title:'🔍 Recherche individuelle',time:6,groups:{CP:{state:'En autonomie',work:'Remettre les cartes 1 à 30 dans l’ordre'},CE1:{state:'Recherche seul',work:'Construire 124 avec les bûchettes'},CE2:{state:'Recherche seul',work:'Construire 1 247 avec les bûchettes / schéma si trop long'}},objective:'Je cherche une stratégie pour compter sans tout recompter un par un.',student:'Je cherche seul d’abord. Je dois pouvoir expliquer ma méthode.',steps:['CP : range les cartes-nombres de 1 à 30.','CE1 : construis 124 avec des paquets de 10 et des unités.','CE2 : construis ou représente 1 247 avec milliers, centaines, dizaines, unités.'],exercise:'Sur ardoise : écrire ce que l’on a obtenu. CE1 : ... dizaines et ... unités. CE2 : ... M ... C ... D ... U.',teacher:'Organisation : recherche individuelle, pas en binôme. Passer vite pour observer les stratégies.',question:'Comment faire pour être sûr de ne pas se tromper ?',answer:'Faire des paquets de 10, puis de 100 quand c’est possible.',warn:'Ne pas corriger tout de suite. Noter mentalement les erreurs pour la mise en commun.',why:'La recherche individuelle oblige chaque élève à entrer dans la tâche. La mise en commun vient après, pour comparer les stratégies.'},
{title:'👨‍🏫 Je montre',time:8,groups:{CP:{state:'En autonomie',work:'Fichier CP : suite numérique / nombres jusqu’à 30'},CE1:{state:'Avec le maître',work:'Observer 124 : 12 dizaines et 4 unités'},CE2:{state:'Avec le maître',work:'Observer les regroupements jusqu’aux milliers'}},objective:'Je regarde la stratégie correcte.',student:'Le maître montre. Les élèves observent et expliquent ensuite.',steps:['Je fais des paquets de 10.','Je compte les dizaines et les unités.','Si j’ai 10 dizaines, je peux faire 1 centaine.','Si j’ai 10 centaines, je peux faire 1 millier.'],exercise:'Avec le maître : CE1 répondent 124 = ? dizaines et ? unités. CE2 complètent le tableau M/C/D/U.',teacher:'Je fais. Vous regardez. Je prends 124 bûchettes : je fais des paquets de 10. J’obtiens 12 dizaines et 4 unités. Puis je peux aussi regrouper 10 dizaines pour faire 1 centaine.',question:'124, c’est combien de dizaines et d’unités ?',answer:'124 = 12 dizaines et 4 unités. C’est aussi 1 centaine, 2 dizaines et 4 unités.',warn:'Erreur fréquente : “124 = 1 dizaine et 24 unités”. Faire distinguer chiffre des dizaines et nombre de dizaines.',why:'La modélisation rend visible la stratégie experte avant de demander aux élèves de l’appliquer seuls.'},
{title:'👥 Nous faisons',time:8,groups:{CP:{state:'Avec le maître',work:'Jeu du furet jusqu’à 30 + nombre manquant'},CE1:{state:'En autonomie guidée',work:'Ardoise : 46, 82, 124 en D/U'},CE2:{state:'En autonomie guidée',work:'Tableau M/C/D/U : 1 247 et 3 058'}},objective:'Nous appliquons la stratégie.',student:'Chaque niveau a une tâche claire pendant que le maître est avec les CP.',steps:['CP avec le maître : compter de 1 à 30, puis retrouver un nombre caché.','CE1 : écrire 46, 82, 124 en dizaines et unités.','CE2 : placer 1 247 et 3 058 dans le tableau de numération.'],exercise:'Correction rapide sur ardoise au signal du maître.',teacher:'Avec CP : jeu du furet jusqu’à 30, puis retrouver le nombre manquant. Pendant ce temps, CE écrivent et lèvent l’ardoise au signal.',question:'CP : quel nombre vient après 19 ? CE : comment écris-tu 124 ?',answer:'Après 19 : 20. CE1 : 12 dizaines et 4 unités. CE2 : 1 millier, 2 centaines, 4 dizaines, 7 unités.',warn:'Pour les CP, ne pas rester trop longtemps : séance courte, rythmée, orale.',why:'Les CE ont une tâche d’application courte et vérifiable pendant que les CP reçoivent l’enseignement spécifique dont ils ont besoin.'},
{title:'✍️ Vous faites',time:7,groups:{CP:{state:'En autonomie',work:'Fichier CP : exercices de la page'},CE1:{state:'En autonomie',work:'Manuel/fichier CE1 : exercices prévus'},CE2:{state:'En autonomie',work:'Manuel/fichier CE2 : exercices prévus'}},objective:'Je m’entraîne seul après avoir compris la méthode.',student:'Je travaille seul. Si je bloque, je reprends la stratégie affichée.',steps:['Je lis la consigne.','Je cherche avec la stratégie des paquets.','Je vérifie avec le tableau de numération.'],exercise:'CP : page du fichier sur la suite jusqu’à 30. CE1 : exercices de lecture D/U. CE2 : exercices de lecture jusqu’à 5 999.',teacher:'Circuler. Corriger d’abord les erreurs de stratégie, pas seulement les résultats.',question:'Quelle stratégie dois-tu utiliser ?',answer:'Je fais des paquets de 10, puis de 100, puis je lis le tableau.',warn:'Ne pas laisser un élève recompter un par un une grande collection.',why:'La pratique autonome arrive seulement après l’objectif, la réactivation, la recherche et la modélisation.'},
{title:'📄 Trace écrite',time:3,groups:{CP:{state:'Écoute / rangement',work:'Ranger le matériel'},CE1:{state:'Trace écrite',work:'Coller la trace A5 si la notion est comprise'},CE2:{state:'Trace écrite',work:'Coller la trace A5 si la notion est comprise'}},objective:'Je retiens la méthode.',student:'La trace écrite résume ce que nous avons appris.',steps:['Lire la leçon.','Faire le mini-exercice oralement ou sur ardoise.','Coller la trace A5.'],exercise:'Mini-exercice intégré à la trace : 46, 82, 2 436.',teacher:'Lire la trace. Faire compléter oralement le mini-exercice avant collage si possible.',question:'Que dois-je faire pour compter une grande collection ?',answer:'Je fais des paquets de 10, puis de 100, puis de 1000 si besoin.',warn:'Trace écrite seulement si la manipulation a été comprise.',why:'La trace formalise une stratégie déjà travaillée ; elle ne remplace pas la manipulation.'},
{title:'✅ Vérification flash',time:3,groups:{CP:{state:'Ardoise',work:'Écrire le nombre après 28'},CE1:{state:'Ardoise',work:'57 = ... dizaines et ... unités'},CE2:{state:'Ardoise',work:'4 305 = ... M ... C ... D ... U'}},objective:'Je vérifie que j’ai compris.',student:'Je réponds vite sur ardoise.',steps:['CP : écrire le nombre qui vient après 28.','CE1 : compléter 57 en dizaines et unités.','CE2 : compléter 4 305 en M/C/D/U.'],exercise:'Réponses sur ardoise, levées au signal.',teacher:'Si moins de 80% réussissent : prévoir reprise courte demain.',question:'Réponses ?',answer:'Après 28 : 29. 57 = 5 dizaines et 7 unités. 4 305 = 4 milliers, 3 centaines, 0 dizaine, 5 unités.',warn:'Repérer les élèves qui confondent chiffre des dizaines et nombre de dizaines.',why:'La vérification flash permet de décider immédiatement s’il faut reprendre avant la séance suivante.'}
];
function renderList(){phaseList.innerHTML=phases.map((p,i)=>`<button class="phase ${i===current?'active':''}" onclick="go(${i})">${p.title}</button>`).join('')}
function groupPanel(){const g=phases[current].groups; return `<div class="groupPanel">`+['CP','CE1','CE2'].map(l=>{let isWith=g[l].state.includes('Avec'); return `<div class="group ${isWith?'with':'alone'}"><div class="level">${l}</div><b>${g[l].state}</b><div class="work">${g[l].work}</div></div>`}).join('')+`</div>`}
function render(){const p=phases[current]; renderList(); screen.innerHTML=`<h2>${p.title}</h2><div class="objective">${p.objective}</div>${groupPanel()}<p class="studentText">${p.student}</p><div class="studentDetails"><div class="bigBox"><h3>À faire maintenant</h3><ol class="steps">${p.steps.map(x=>`<li>${x}</li>`).join('')}</ol></div><div class="bigBox"><h3>Exercice / réponse attendue côté élèves</h3><p class="studentText">${p.exercise}</p>${animationFor(current)}</div></div>`; renderHelp(); renderTrace();}
function renderHelp(){const p=phases[current]; sideHelp.innerHTML=`<div class="helpItem"><div class="helpTab">Dire</div><div class="helpContent"><h3>🗣️ Script enseignant</h3>${p.teacher}</div></div><div class="helpItem"><div class="helpTab">Question</div><div class="helpContent"><h3>❓ Question à poser</h3>${p.question}<hr><b>✅ Réponse attendue</b><br>${p.answer}</div></div><div class="helpItem"><div class="helpTab">Erreur</div><div class="helpContent"><h3>⚠️ Erreur fréquente</h3>${p.warn}</div></div><div class="helpItem"><div class="helpTab">Pourquoi</div><div class="helpContent"><h3>💡 Pourquoi cette étape ?</h3>${p.why}</div></div>`}
function animationFor(i){if([2,4].includes(i))return `<h3>Manipulation</h3><div class="sticks">${'<span class="stick"></span>'.repeat(10)}<span class="bundle">${'<span class="stick"></span>'.repeat(10)}</span><span class="bundle hundred">10 dizaines = 1 centaine</span></div>`; if(i===5)return `<table class="place-table"><tr><th class="m">M</th><th class="c">C</th><th class="d">D</th><th class="u">U</th></tr><tr><td>1</td><td>2</td><td>4</td><td>7</td></tr></table>`; return `<div class="mat"><span>🪵 bûchettes</span><span>🟨 élastiques</span><span>📊 tableau</span><span>🧮 boulier si utile</span><span>✍️ ardoises</span></div>`}
function renderTrace(){trace.innerHTML=`<h1>Numération — Faire des paquets pour lire un nombre</h1><div class="box"><b>Je retiens</b><br>Pour compter une grande collection, je fais des paquets de <b>10</b>. 10 unités = <span style="background:#fef3c7">1 dizaine</span>. 10 dizaines = <span style="background:#dcfce7">1 centaine</span>. 10 centaines = <span style="background:#dbeafe">1 millier</span>.</div><table><tr><th class="m">🔵 M</th><th class="c">🟩 C</th><th class="d">🟨 D</th><th class="u">🟥 U</th></tr><tr><td>1</td><td>2</td><td>4</td><td>7</td></tr></table><div class="box"><b>Exemples</b><br>124 = <b>12 dizaines</b> et <b>4 unités</b>.<br>124 = <b>1 centaine</b>, <b>2 dizaines</b> et <b>4 unités</b>.</div><div class="box"><b>Je m’entraîne</b><br>1) 46 = ____ dizaines et ____ unités.<br>2) 82 = ____ dizaines et ____ unités.<br>3) 2 436 = ____ M ____ C ____ D ____ U.</div><p style="font-size:12px">□ J’ai compris  □ J’ai encore besoin d’aide</p>`}
function go(i){current=i; render()}
function printTrace(){setTimeout(()=>window.print(),100)}
go(0);
</script>
</body></html>
