<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Maths explicites CP-CE1-CE2 — V1</title>
<style>
:root{--m:#2563eb;--c:#16a34a;--d:#facc15;--u:#ef4444;--ink:#172033;--muted:#64748b;--bg:#f6f7fb;--card:#fff;--teacher:#eef6ff;--student:#fff7ed;--ok:#dcfce7;--auto:#dbeafe;--border:#d8deea}*{box-sizing:border-box}body{margin:0;font-family:Arial,system-ui,sans-serif;background:var(--bg);color:var(--ink)}header{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid var(--border);padding:10px 14px;display:flex;gap:10px;align-items:center;justify-content:space-between}.brand{font-weight:800}.badge{display:inline-block;border-radius:999px;padding:4px 9px;background:#edf2ff;font-weight:700;font-size:13px}.btn{border:0;border-radius:12px;padding:10px 14px;background:#1f2937;color:white;font-weight:700;cursor:pointer}.btn.secondary{background:#e5e7eb;color:#111827}.btn.blue{background:#2563eb}.btn.green{background:#16a34a}.layout{display:grid;grid-template-columns:290px 1fr;min-height:calc(100vh - 58px)}aside{background:#fff;border-right:1px solid var(--border);padding:14px;overflow:auto}.main{padding:18px;overflow:auto}.phase{display:block;width:100%;text-align:left;margin:7px 0;padding:10px;border:1px solid var(--border);background:#fff;border-radius:12px;cursor:pointer}.phase.active{border-color:#2563eb;background:#eff6ff;font-weight:800}.dashboard{display:grid;grid-template-columns:repeat(3,1fr) 150px;gap:10px;margin-bottom:14px}.group{background:#fff;border:1px solid var(--border);border-radius:14px;padding:10px}.group .level{font-weight:900;font-size:18px}.with{background:var(--ok)}.alone{background:var(--auto)}.timer{background:#111827;color:white;border-radius:14px;padding:10px;text-align:center;font-weight:900;font-size:24px}.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(15,23,42,.04)}.card h2{margin-top:0}.teacher{background:var(--teacher)}.student{background:var(--student)}.grid2{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}.objective{font-size:28px;font-weight:900;line-height:1.2}.small{color:var(--muted);font-size:14px}.script{border-left:5px solid #2563eb;padding-left:12px;font-size:18px}.answer{display:none;background:#ecfdf5;border:1px solid #86efac;border-radius:12px;padding:10px;margin-top:10px}.answer.show{display:block}.warn{background:#fff1f2;border:1px solid #fecdd3;border-radius:12px;padding:10px}.mat{display:flex;flex-wrap:wrap;gap:8px}.mat span{background:#f1f5f9;border:1px solid #cbd5e1;border-radius:999px;padding:6px 10px;font-weight:700}.place-table{border-collapse:collapse;width:100%;font-size:26px;text-align:center}.place-table th,.place-table td{border:2px solid #111827;padding:10px}.m{background:#dbeafe}.c{background:#dcfce7}.d{background:#fef3c7}.u{background:#fee2e2}.sticks{min-height:190px;background:#fff;border:2px dashed #cbd5e1;border-radius:16px;padding:16px;display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}.stick{width:9px;height:70px;background:#c08457;border-radius:6px;border:1px solid #7c4a27}.bundle{display:inline-flex;gap:3px;border:4px solid var(--d);border-radius:12px;padding:6px;background:#fffbeb;margin:5px}.hundred{border-color:var(--c);background:#f0fdf4}.thousand{border-color:var(--m);background:#eff6ff}.trace{width:148mm;min-height:105mm;background:#fff;color:#111;margin:auto;border:1px solid #ccc;padding:8mm;font-size:14px}.trace h1{font-size:19px;margin:0 0 5px}.trace .box{border:1px solid #333;border-radius:8px;padding:6px;margin:5px 0}.trace table{width:100%;border-collapse:collapse;text-align:center}.trace th,.trace td{border:1px solid #333;padding:4px}.printOnly{display:none}@media print{body{background:white}header,aside,.noPrint,.dashboard{display:none!important}.layout{display:block}.main{padding:0}.card:not(.printCard){display:none}.printCard{display:block!important;border:0;box-shadow:none;margin:0;padding:0}.trace{border:0;width:148mm;min-height:105mm}.printOnly{display:block}@page{size:A5 landscape;margin:7mm}}
</style>
</head>
<body>
<header><div class="brand">📚 Maths explicites CP-CE1-CE2 <span class="badge">V1 réelle</span></div><div><button class="btn secondary" onclick="toggleMode()" id="modeBtn">Mode élèves</button> <button class="btn blue" onclick="printTrace()">Imprimer la trace A5</button></div></header>
<div class="layout">
<aside class="noPrint"><h3>Séance 1 — Numération</h3><p class="small">Objectif : mener 40 min de séance avec guidage enseignant, affichage élèves et trace écrite.</p><div id="phaseList"></div><hr><button class="btn green" onclick="startTimer(5)">⏱ 5 min</button> <button class="btn" onclick="startTimer(10)">10 min</button><p class="small">Matériel principal : bûchettes + élastiques.</p></aside>
<main class="main">
<div class="dashboard noPrint" id="dash"></div>
<section class="card" id="screen"></section>
<section class="card printCard" id="traceCard"><div class="trace" id="trace"></div></section>
</main>
</div>
<script>
let teacherMode=true, current=0, remaining=0, tick=null;
const colors={m:'🔵 milliers',c:'🟩 centaines',d:'🟨 dizaines',u:'🟥 unités'};
const phases=[
{title:'Préparation',time:0,groups:{CP:'Préparer cartes 1-30',CE1:'Bûchettes + élastiques',CE2:'Bûchettes + élastiques'},objective:'Préparer la séance sans ouvrir le guide du maître.',student:'Nous allons apprendre à mieux construire et lire les nombres.',teacher:'Sortir : 160 bûchettes environ, 30 élastiques, ardoises, tableaux de numération, cartes-nombres CP, manuels/fichiers.',question:'Pourquoi les bûchettes ?',answer:'Elles obligent les élèves à construire eux-mêmes les paquets de 10, 100 et 1000.',warn:'Ne pas distribuer trop tôt tout le matériel : risque de manipulation parasite.'},
{title:'🎯 Objectif',time:3,groups:{CP:'Avec le maître',CE1:'Avec le maître',CE2:'Avec le maître'},objective:'Aujourd’hui, nous apprenons à compter et à lire les nombres avec des paquets.',student:'CP : je compte jusqu’à 30. CE1 : je lis un nombre avec dizaines et unités. CE2 : je lis jusqu’à 5 999 avec milliers, centaines, dizaines, unités.',teacher:'Dire clairement les objectifs. Faire répéter : « Je vais apprendre à compter plus vite grâce aux paquets. »',question:'À quoi servent les paquets de 10 ?',answer:'À compter plus vite et à éviter de recompter un par un.',warn:'Si l’objectif n’est pas formulé, les élèves croient qu’ils “jouent avec des bâtons”.'},
{title:'🧠 Réactivation',time:5,groups:{CP:'Avec le maître',CE1:'Avec le maître',CE2:'Avec le maître'},objective:'Réactiver 10 unités = 1 dizaine.',student:'Je me rappelle : 10 unités forment 1 dizaine.',teacher:'Montrer 10 bûchettes isolées. Les compter une à une puis les attacher avec un élastique.',question:'Quand j’attache 10 bûchettes, comment s’appelle le paquet ?',answer:'Une dizaine.',warn:'Erreur : “un paquet” sans préciser sa valeur. Faire dire : “un paquet de 10, donc une dizaine”.'},
{title:'🔍 Recherche individuelle',time:6,groups:{CP:'Autonomie : cartes-nombres 1 à 30 à remettre dans l’ordre',CE1:'Recherche individuelle : construire 124 en bûchettes',CE2:'Recherche individuelle : construire 1 247 en bûchettes'},objective:'Trouver une stratégie pour compter sans tout recompter un par un.',student:'CE1-CE2 : construis le nombre avec les bûchettes. CP : range les cartes-nombres.',teacher:'Organisation : recherche individuelle, pas en binôme. Passer vite pour observer les stratégies.',question:'Comment faire pour être sûr de ne pas se tromper ?',answer:'Faire des paquets de 10, puis de 100 quand c’est possible.',warn:'Ne pas corriger tout de suite. Noter mentalement les erreurs pour la mise en commun.'},
{title:'👨‍🏫 Je montre',time:8,groups:{CP:'Autonomie : fichier / entraînement suite numérique',CE1:'Avec le maître',CE2:'Avec le maître'},objective:'Modéliser la stratégie : unités → dizaines → centaines → milliers.',student:'Je regarde la stratégie du maître.',teacher:'Je fais. Vous regardez. Je prends 124 bûchettes : je fais des paquets de 10. J’obtiens 12 dizaines et 4 unités. Puis je peux aussi regrouper 10 dizaines pour faire 1 centaine.',question:'124, c’est combien de dizaines et d’unités ?',answer:'124 = 12 dizaines et 4 unités. C’est aussi 1 centaine, 2 dizaines et 4 unités.',warn:'Erreur fréquente : “124 = 1 dizaine et 24 unités”. Réponse : oui possible matériellement, mais ce n’est pas l’écriture en paquets bien organisés.'},
{title:'👥 Nous faisons',time:8,groups:{CP:'Avec le maître : suite orale jusqu’à 30',CE1:'Autonomie courte : ardoise 46, 82, 124 en D/U',CE2:'Autonomie courte : tableau M/C/D/U avec 1 247 et 3 058'},objective:'Faire verbaliser chaque niveau.',student:'Chacun sait ce qu’il doit faire : CP avec le maître, CE en autonomie sur ardoise.',teacher:'Avec CP : jeu du furet jusqu’à 30, puis retrouver le nombre manquant. Pendant ce temps, CE écrivent et lèvent l’ardoise au signal.',question:'CP : quel nombre vient après 19 ? CE : comment écris-tu 124 ?',answer:'Après 19 : 20. CE1 : 12 dizaines et 4 unités. CE2 : 1 millier, 2 centaines, 4 dizaines, 7 unités.',warn:'Pour les CP, ne pas rester trop longtemps : séance courte, rythmée, orale.'},
{title:'✍️ Vous faites',time:7,groups:{CP:'Fichier CP : exercices de la page',CE1:'Manuel/fichier CE1 : exercices prévus',CE2:'Manuel/fichier CE2 : exercices prévus'},objective:'S’entraîner seul après guidage.',student:'Je m’entraîne seul dans mon fichier. Si je bloque, je regarde le tableau ou les bûchettes.',teacher:'Circuler. Corriger d’abord les erreurs de stratégie, pas seulement les résultats.',question:'Quelle stratégie dois-tu utiliser ?',answer:'Je fais des paquets de 10, puis de 100, puis je lis le tableau.',warn:'Ne pas laisser un élève recompter un par un une grande collection.'},
{title:'📄 Trace écrite',time:3,groups:{CP:'Écoute / rangement',CE1:'Colle la trace A5 si pertinente',CE2:'Colle la trace A5 si pertinente'},objective:'Stabiliser la stratégie.',student:'Je retiens la méthode pour lire et construire un nombre.',teacher:'Lire la trace. Faire compléter oralement le mini-exercice avant collage si possible.',question:'Que dois-je faire pour compter une grande collection ?',answer:'Je fais des paquets de 10, puis de 100, puis de 1000 si besoin.',warn:'Trace écrite seulement si la manipulation a été comprise.'},
{title:'✅ Vérification flash',time:3,groups:{CP:'Ardoise : nombre après 28',CE1:'Ardoise : 57 = ... D ... U',CE2:'Ardoise : 4 305 = ... M ... C ... D ... U'},objective:'Vérifier rapidement avant de passer à la suite.',student:'Je réponds sur ardoise.',teacher:'Si moins de 80% réussissent : prévoir reprise courte demain.',question:'Réponses ?',answer:'Après 28 : 29. 57 = 5 dizaines et 7 unités. 4 305 = 4 milliers, 3 centaines, 0 dizaine, 5 unités.',warn:'Repérer les élèves qui confondent chiffre des dizaines et nombre de dizaines.'}
];
function renderList(){phaseList.innerHTML=phases.map((p,i)=>`<button class="phase ${i===current?'active':''}" onclick="go(${i})">${p.title}</button>`).join('')}
function renderDash(){const g=phases[current].groups; dash.innerHTML=['CP','CE1','CE2'].map(l=>`<div class="group ${g[l].includes('Avec')?'with':'alone'}"><div class="level">${l}</div><div>${g[l]}</div></div>`).join('')+`<div class="timer">${fmt(remaining||phases[current].time*60)}</div>`}
function render(){const p=phases[current]; renderList(); renderDash(); traceCard.style.display=current===7?'block':'none'; screen.innerHTML=`<div class="grid2"><div class="card student"><h2>${p.title}</h2><div class="objective">${p.objective}</div><p style="font-size:22px">${p.student}</p>${animationFor(current)}</div><div class="card teacher" style="display:${teacherMode?'block':'none'}"><h2>👨‍🏫 Guide enseignant</h2><p><b>Temps :</b> ${p.time} min</p><div class="script">${p.teacher}</div><h3>Question</h3><p>❓ ${p.question}</p><button class="btn secondary" onclick="document.querySelector('.answer').classList.toggle('show')">Afficher / cacher la réponse</button><div class="answer"><b>✅ Réponse attendue :</b><br>${p.answer}</div><h3>Erreur fréquente</h3><div class="warn">⚠️ ${p.warn}</div></div></div>`; renderTrace()}
function animationFor(i){if([2,4].includes(i))return `<h3>Manipulation</h3><div class="sticks">${'<span class="stick"></span>'.repeat(10)}<span class="bundle">${'<span class="stick"></span>'.repeat(10)}</span><span class="bundle hundred">10 dizaines = 1 centaine</span></div><p><button class="btn blue" onclick="makeBundle()">Former un paquet de 10</button></p>`; if(i===5)return `<table class="place-table"><tr><th class="m">M</th><th class="c">C</th><th class="d">D</th><th class="u">U</th></tr><tr><td>1</td><td>2</td><td>4</td><td>7</td></tr></table>`; return `<div class="mat"><span>🪵 bûchettes</span><span>🟨 élastiques</span><span>📊 tableau de numération</span><span>🧮 boulier si utile</span><span>✍️ ardoises</span></div>`}
function makeBundle(){alert('Dans cette V1, l’animation montre le principe. V1.1 : regroupement plus interactif.');}
function renderTrace(){trace.innerHTML=`<h1>Numération — Faire des paquets pour lire un nombre</h1><div class="box"><b>Je retiens</b><br>Pour compter une grande collection, je fais des paquets de <b>10</b>. 10 unités = <span style="background:#fef3c7">1 dizaine</span>. 10 dizaines = <span style="background:#dcfce7">1 centaine</span>. 10 centaines = <span style="background:#dbeafe">1 millier</span>.</div><table><tr><th class="m">🔵 M</th><th class="c">🟩 C</th><th class="d">🟨 D</th><th class="u">🟥 U</th></tr><tr><td>1</td><td>2</td><td>4</td><td>7</td></tr></table><div class="box"><b>Exemples</b><br>124 = <b>12 dizaines</b> et <b>4 unités</b>.<br>124 = <b>1 centaine</b>, <b>2 dizaines</b> et <b>4 unités</b>.</div><div class="box"><b>Je m’entraîne</b><br>1) 46 = ____ dizaines et ____ unités.<br>2) 82 = ____ dizaines et ____ unités.<br>3) 2 436 = ____ M ____ C ____ D ____ U.</div><p style="font-size:12px">□ J’ai compris  □ J’ai encore besoin d’aide</p>`}
function toggleMode(){teacherMode=!teacherMode; modeBtn.textContent=teacherMode?'Mode élèves':'Mode enseignant'; render()}
function go(i){current=i; remaining=phases[i].time*60; render()}
function fmt(s){let m=Math.floor(s/60),sec=s%60;return `${m}:${String(sec).padStart(2,'0')}`}
function startTimer(min){clearInterval(tick); remaining=min*60; renderDash(); tick=setInterval(()=>{remaining=Math.max(0,remaining-1);renderDash();if(!remaining)clearInterval(tick)},1000)}
function printTrace(){current=7;render();setTimeout(()=>window.print(),100)}
go(0);
</script>
</body></html>
